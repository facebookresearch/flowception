# ─────────────────────────────────────────────────────────────────
# Toy-coloring 3×3 dataset — tiny FlowceptionV1 — identity VAE
# Interpolation variant: context frames at both ends
#
# Intended for single-GPU debugging / integration testing.
# Run with:
#   python main.py -c configs/flowception/toy/toy_coloring_interpolate.yaml -t -n toy_interp
# ─────────────────────────────────────────────────────────────────

DATA:
  AESTHETIC_COND: false
  ANNOT_TRAIN: ''
  ANNOT_VAL: ''
  BLUR_COND: false
  CAPTION_IDX:
  - '1'
  CLUSTER: local
  CROP_SCALE: 1.0
  DATALOADER_STYLE: map_style
  DATASET: toy_coloring
  DATASET_VARIANT: original
  DATA_ROOT: ''
  ENTROPY_THRESHOLD: -1.0
  EXTRA_DATASETS: none
  FLIP_COND: false
  MAX_FRAMES: 30
  NUM_CLASSES: 1000
  NUM_CONTEXT_FRAMES: 2
  PADDING_INDEX: 3
  POWER_COSINE: false
  RECAPTION:
    RECAPTIONED_RATIO: 0.0
  VAL_DATASET: ''
  VAL_DATASET_VARIANT: ''
  VAL_DATA_ROOT: ''
  VIDEO:
    MIN_MOTION_SCORE: -1.0
    SAMPLING_FPS: 24
  WORKERS: 0

FRAMEWORK:
  DENOISER: DENOISER
  SIGMA_SCALE: 1.0
  TIMESTEPS: 1000
  VIDEO:
    REPA:
      EMB_DIM: 256
      LAYER: -1

EVAL:
  FID:
    SAMPLER: ddim
    SKIP_F: 4
    TARGET_DATASET: val
  GROUPS: []
  GROUPS_COUNT: 1
  NUM_SAMPLES: 16

FLOWCEPTION:
  ARCHITECTURE:
    HEAD_SHARED_OFFSETS: false
    MERGE_MODE: gating
  KAPPA_SCHEDULER: linear
  NUM_START_FRAMES: 2
  TAU_GLOBAL_DIST: lognorm

LOGGING:
  LOG_LEVEL: INFO

MODEL:
  ADD_REFINER: false
  CONDITION: T2I-FlowceptionV1-Tiny/1
  DENOISER:
    CONCAT_DIM: 256
  DROP_PATH: 0.0
  EMBED_TYPE: scaled
  ENCODER: {}
  OUT_CH: 3
  STRICT_WEIGHTS: false
  TEMPORAL_DOWNSCALING: 1
  TEXT_ENCODER:
    HIDDEN_DIM: 256
    HIDDEN_DIM_2: 128
    TOKEN_LIMIT: 16
    VERSION: dummy
    ZERO_OUT: none
  VAE:
    CHECKPOINT: ''
    FACTOR: 1
    NAME: IDENTITY
    NORMALIZE_LATENTS: false
    OUT_CH: 3
    SCALE_FACTOR: 1.0
    TEMPORAL_FACTOR: 1
  VIDEO:
    ATTENTION_MASK: all
    CONTEXT_FRAMES: 1
    CONTEXT_LATENTS: 1
    RD_MASK_FIRST_FRAME: true
    ROPE_H_MULT: 200
    ROPE_MODE: global
    ROPE_THETA: 10000
    ROPE_T_MULT: 20
    ROPE_W_MULT: 200
  WEIGHTS: ''

SAMPLER:
  CFG_SCALE: 1.0
  NUM_STEPS: 20
  UNCOND_GEN: true

SOLVER:
  AMP: false
  AMP_TYPE: bf16
  BATCH_SIZE: 64
  CKPT_EVERY: 2500
  COMPILE_MODELS: false
  DEC_BATCH_SIZE: 16
  EPOCHS: 10000
  EVAL_FID: false
  EVAL_FREQ: 500
  FSDP:
    WRAP_CONDITIONER: false
  IM_SIZE: 3
  LOG_EVERY: 10
  LOG_WANDB: false
  LR: 0.001
  MAX_GRAD_NORM: 1.0
  MAX_ITER: 100000
  OPTIM: Adam
  SNAPSHOT_F: 2000
  USE_CFG: false
  WEIGHT_DECAY: 0.0
  TRAINER: flowception_interpolate
